<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur VMA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 16px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 80px;
    }
    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: #6b7280;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }
    input.invalid {
      border-color: #ef4444;
    }
    .error-msg {
      font-size: 0.72rem;
      color: #ef4444;
      min-height: 16px;
    }
    .bloc {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      position: relative;
    }
    .bloc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .bloc-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
    }
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #ef4444; }
    .btn-add {
      width: 100%;
      padding: 10px;
      border: 1.5px dashed #6366f1;
      border-radius: 8px;
      background: transparent;
      color: #6366f1;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #eef2ff; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-bloc {
      margin-bottom: 14px;
    }
    .result-title {
      font-weight: 600;
      font-size: 0.92rem;
      color: #374151;
      margin-bottom: 4px;
    }
    .result-line {
      font-size: 0.88rem;
      color: #4b5563;
      margin-left: 8px;
      line-height: 1.7;
    }
    .result-line strong { color: #6366f1; }
    .export-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-export {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-export:active { transform: scale(0.98); }
    .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-fit  { background: #6366f1; color: #fff; }
    .btn-tcx  { background: #10b981; color: #fff; }
    /* Garmin card */
    .btn-garmin {
      background: #1da462;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .btn-garmin:active { transform: scale(0.98); }
    .btn-garmin:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-garmin-secondary {
      background: transparent;
      color: #6b7280;
      border: none;
      font-size: 0.82rem;
      cursor: pointer;
      margin-top: 6px;
      text-decoration: underline;
    }
    .garmin-status {
      font-size: 0.9rem;
      color: #1da462;
      font-weight: 600;
      margin-bottom: 10px;
    }
    #garmin-msg {
      font-size: 0.85rem;
      margin-top: 8px;
      min-height: 20px;
    }
    #garmin-msg a { color: #1da462; }
    #no-results {
      color: #9ca3af;
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }
    @media (max-width: 400px) {
      .row { gap: 8px; }
      .field { min-width: 60px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏃 Calculateur VMA</h1>

    <!-- Athlete info -->
    <div class="card">
      <h2>Athlète</h2>
      <div class="row">
        <div class="field">
          <label for="athlete-name">Nom</label>
          <input type="text" id="athlete-name" placeholder="Ex: Mehdi" maxlength="30">
          <span class="error-msg" id="err-name"></span>
        </div>
        <div class="field" style="max-width:130px">
          <label for="athlete-vma">VMA (km/h)</label>
          <input type="number" id="athlete-vma" placeholder="14" min="8" max="25" step="1">
          <span class="error-msg" id="err-vma"></span>
        </div>
      </div>
    </div>

    <!-- Blocks -->
    <div class="card">
      <h2>Séance</h2>
      <div id="blocs-container"></div>
      <button class="btn-add" id="btn-add-bloc">+ Ajouter un bloc</button>
    </div>

    <!-- Results -->
    <div class="card">
      <h2>Résultats</h2>
      <div id="results">
        <p id="no-results">Remplissez les champs pour voir les résultats</p>
      </div>
    </div>

    <!-- Garmin auto-send -->
    <div class="card" id="garmin-card">
      <h2>Envoyer sur Garmin</h2>

      <!-- State A: not connected -->
      <div id="garmin-state-a">
        <div class="field" style="margin-bottom:10px">
          <label for="garmin-email">Email</label>
          <input type="text" id="garmin-email" placeholder="user@example.com">
        </div>
        <div class="field" style="margin-bottom:10px">
          <label for="garmin-password">Mot de passe</label>
          <input type="password" id="garmin-password" placeholder="••••••••">
        </div>
        <button class="btn-garmin" id="btn-garmin-connect" onclick="garminConnect()">
          Connecter mon compte Garmin
        </button>
        <div id="garmin-msg"></div>
      </div>

      <!-- State B: connected -->
      <div id="garmin-state-b" style="display:none">
        <div class="garmin-status" id="garmin-connected-label"></div>
        <button class="btn-garmin" id="btn-garmin-send" onclick="garminSend()">
          ↑ Envoyer la séance sur Garmin
        </button>
        <br>
        <button class="btn-garmin-secondary" onclick="garminDisconnect()">Se déconnecter</button>
        <div id="garmin-msg-b"></div>
      </div>
    </div>

    <!-- Export -->
    <div class="card">
      <h2>Export montre</h2>
      <div class="export-btns">
        <button class="btn-export btn-fit" id="btn-fit" disabled>
          ↓ Télécharger .fit (Polar)
        </button>
        <button class="btn-export btn-tcx" id="btn-tcx" disabled>
          ↓ Télécharger .tcx (Huawei)
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── Calculation ────────────────────────────────────────────────────────────

    /**
     * Format raw seconds into "M:SS" or "MM:SS".
     * Uses Math.round first to avoid floating-point drift and ":60" bug.
     */
    function formatTime(rawSeconds) {
      const total = Math.round(rawSeconds);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    /**
     * Calculate target time (seconds) and pace (seconds/km) for a given block.
     * @param {number} vma      - VMA in km/h
     * @param {number} pct      - percentage of VMA (e.g. 90 for 90%)
     * @param {number} distance - distance in meters
     * @returns {{ timeS: number, paceS: number, timeDisplay: string, paceDisplay: string }}
     */
    function calcBlock(vma, pct, distance) {
      const speedMs = vma * (pct / 100) / 3.6;        // m/s
      const timeS   = distance / speedMs;              // seconds
      const paceS   = (timeS / distance) * 1000;       // seconds per km
      return {
        timeS,
        paceS,
        timeDisplay: formatTime(timeS),
        paceDisplay: formatTime(paceS) + '/km',
      };
    }

    /**
     * Build slug for filename from athlete name.
     * "Méhdi Traoré" → "mehdi-traore"
     */
    function slugify(name) {
      return name
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .toLowerCase();
    }

    /**
     * Return today's date as YYYY-MM-DD.
     */
    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    // ─── State ───────────────────────────────────────────────────────────────────

    let blocs = [];   // array of { reps, dist, pct, recup }
    let blocCounter = 0;

    // ─── Validation helpers ──────────────────────────────────────────────────────

    const RULES = {
      name:  { min: 1,   max: 30,   msg: 'Entrez votre nom' },
      vma:   { min: 8,   max: 25,   msg: 'VMA entre 8 et 25 km/h' },
      reps:  { min: 1,   max: 20,   msg: 'Min 1 répétition' },
      dist:  { min: 100, max: 5000, msg: 'Distance entre 100 et 5000m' },
      pct:   { min: 50,  max: 150,  msg: '% entre 50 et 150' },
      recup: { min: 0,   max: 30,   msg: 'Récup entre 0 et 30 min' },
    };

    function validateInt(value, rule) {
      const n = parseInt(value, 10);
      if (isNaN(n) || n < rule.min || n > rule.max) return rule.msg;
      return null;
    }

    function validateName(value) {
      if (!value || value.trim().length === 0) return RULES.name.msg;
      if (value.trim().length > RULES.name.max) return RULES.name.msg;
      return null;
    }

    // ─── Block DOM ───────────────────────────────────────────────────────────────

    function createBlocHTML(id, index) {
      return `
        <div class="bloc" id="bloc-${id}" data-id="${id}">
          <div class="bloc-header">
            <span class="bloc-title">Bloc ${index}</span>
            <button class="btn-remove" data-remove="${id}" title="Supprimer">×</button>
          </div>
          <div class="row">
            <div class="field" style="max-width:70px">
              <label>Rép.</label>
              <input type="number" class="b-reps" min="1" max="20" placeholder="3">
              <span class="error-msg b-err-reps"></span>
            </div>
            <div class="field">
              <label>Distance (m)</label>
              <input type="number" class="b-dist" min="100" max="5000" placeholder="800">
              <span class="error-msg b-err-dist"></span>
            </div>
            <div class="field" style="max-width:80px">
              <label>% VMA</label>
              <input type="number" class="b-pct" min="50" max="150" placeholder="90">
              <span class="error-msg b-err-pct"></span>
            </div>
            <div class="field" style="max-width:90px">
              <label>Récup (min)</label>
              <input type="number" class="b-recup" min="0" max="30" placeholder="2">
              <span class="error-msg b-err-recup"></span>
            </div>
          </div>
        </div>
      `;
    }

    function addBloc() {
      if (blocs.length >= 10) return;
      blocCounter++;
      const id = blocCounter;
      blocs.push({ id, reps: '', dist: '', pct: '', recup: '' });
      const container = document.getElementById('blocs-container');
      const div = document.createElement('div');
      div.innerHTML = createBlocHTML(id, blocs.length);
      container.appendChild(div.firstElementChild);
      rebindBlocListeners();
      updateAddButton();
      update();
    }

    function removeBloc(id) {
      blocs = blocs.filter(b => b.id !== id);
      const el = document.getElementById('bloc-' + id);
      if (el) el.remove();
      // Re-number visible bloc titles
      document.querySelectorAll('.bloc').forEach((el, i) => {
        el.querySelector('.bloc-title').textContent = 'Bloc ' + (i + 1);
      });
      updateAddButton();
      update();
    }

    function updateAddButton() {
      const btn = document.getElementById('btn-add-bloc');
      btn.disabled = blocs.length >= 10;
      btn.textContent = blocs.length >= 10
        ? '+ Ajouter un bloc (max 10 atteint)'
        : '+ Ajouter un bloc';
    }

    function rebindBlocListeners() {
      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.onclick = () => removeBloc(parseInt(btn.dataset.remove, 10));
      });
      document.querySelectorAll('.bloc').forEach(el => {
        el.querySelectorAll('input').forEach(inp => {
          inp.oninput = update;
        });
      });
    }

    // ─── Update (validation + results) ──────────────────────────────────────────

    function update() {
      const nameEl  = document.getElementById('athlete-name');
      const vmaEl   = document.getElementById('athlete-vma');
      const nameErr = document.getElementById('err-name');
      const vmaErr  = document.getElementById('err-vma');

      // Validate athlete fields
      const nameErrMsg = validateName(nameEl.value);
      const vmaErrMsg  = validateInt(vmaEl.value, RULES.vma);
      nameErr.textContent = nameErrMsg || '';
      vmaErr.textContent  = vmaErrMsg  || '';
      nameEl.classList.toggle('invalid', !!nameErrMsg);
      vmaEl.classList.toggle('invalid', !!vmaErrMsg);

      // Validate each bloc and collect data
      let allValid = !nameErrMsg && !vmaErrMsg && blocs.length > 0;
      const blocData = [];

      document.querySelectorAll('.bloc').forEach(el => {
        const repsIn  = el.querySelector('.b-reps');
        const distIn  = el.querySelector('.b-dist');
        const pctIn   = el.querySelector('.b-pct');
        const recupIn = el.querySelector('.b-recup');

        const repsErr  = validateInt(repsIn.value,  RULES.reps);
        const distErr  = validateInt(distIn.value,  RULES.dist);
        const pctErr   = validateInt(pctIn.value,   RULES.pct);
        const recupErr = validateInt(recupIn.value, RULES.recup);

        el.querySelector('.b-err-reps').textContent  = repsErr  || '';
        el.querySelector('.b-err-dist').textContent  = distErr  || '';
        el.querySelector('.b-err-pct').textContent   = pctErr   || '';
        el.querySelector('.b-err-recup').textContent = recupErr || '';

        repsIn.classList.toggle('invalid',  !!repsErr);
        distIn.classList.toggle('invalid',  !!distErr);
        pctIn.classList.toggle('invalid',   !!pctErr);
        recupIn.classList.toggle('invalid', !!recupErr);

        const blocValid = !repsErr && !distErr && !pctErr && !recupErr;
        if (!blocValid) allValid = false;

        if (blocValid) {
          blocData.push({
            reps:  parseInt(repsIn.value, 10),
            dist:  parseInt(distIn.value, 10),
            pct:   parseInt(pctIn.value, 10),
            recup: parseInt(recupIn.value, 10),
          });
        }
      });

      // Render results
      const resultsEl = document.getElementById('results');

      if (!allValid || blocData.length !== blocs.length) {
        resultsEl.innerHTML = '<p style="color:#9ca3af;font-size:.88rem;text-align:center;padding:8px 0">Remplissez les champs pour voir les résultats</p>';
        document.getElementById('btn-fit').disabled = true;
        document.getElementById('btn-tcx').disabled = true;
        return;
      }

      const vma = parseInt(vmaEl.value, 10);
      let html = '';
      blocData.forEach((b, i) => {
        const { timeDisplay, paceDisplay } = calcBlock(vma, b.pct, b.dist);
        const recupDisplay = b.recup > 0 ? b.recup + ':00' : 'aucune';
        html += `
          <div class="result-bloc">
            <div class="result-title">Bloc ${i + 1} — ${b.reps} × ${b.dist}m @${b.pct}% VMA</div>
            <div class="result-line">→ Allure : <strong>${paceDisplay}</strong> | Temps : <strong>${timeDisplay}</strong></div>
            <div class="result-line">→ Récupération : <strong>${recupDisplay}</strong></div>
          </div>
        `;
      });
      resultsEl.innerHTML = html;
      document.getElementById('btn-fit').disabled = false;
      document.getElementById('btn-tcx').disabled = false;
    }

    // ─── Init ────────────────────────────────────────────────────────────────────

    document.getElementById('btn-add-bloc').addEventListener('click', addBloc);
    document.getElementById('athlete-name').addEventListener('input', update);
    document.getElementById('athlete-vma').addEventListener('input', update);

    // Start with one bloc
    addBloc();
    initGarminUI();

  // ─── FIT export ──────────────────────────────────────────────────────────────

  /** CRC-16/IBM (poly 0x8005) used by Garmin FIT. */
  function crc16(data) {
    const table = [
      0x0000, 0xCC01, 0xD801, 0x1400, 0xF001, 0x3C00, 0x2800, 0xE401,
      0xA001, 0x6C00, 0x7800, 0xB401, 0x5000, 0x9C01, 0x8801, 0x4400,
    ];
    let crc = 0;
    for (const byte of data) {
      let tmp = table[crc & 0xF];
      crc = (crc >> 4) & 0x0FFF;
      crc ^= tmp ^ table[byte & 0xF];
      tmp = table[crc & 0xF];
      crc = (crc >> 4) & 0x0FFF;
      crc ^= tmp ^ table[(byte >> 4) & 0xF];
    }
    return crc;
  }

  /** Write little-endian uint8/16/32 into a DataView at offset. Returns new offset. */
  function writeU8(dv, off, val)  { dv.setUint8(off, val);               return off + 1; }
  function writeU16(dv, off, val) { dv.setUint16(off, val, true);        return off + 2; }
  function writeU32(dv, off, val) { dv.setUint32(off, val, true);        return off + 4; }

  /** Write a null-terminated ASCII string (padded to `len` bytes). */
  function writeStr(arr, off, str, len) {
    for (let i = 0; i < len; i++) {
      arr[off + i] = i < str.length ? str.charCodeAt(i) : 0;
    }
    return off + len;
  }

  /**
   * Generate a FIT workout binary for Garmin / Polar.
   * @param {string} athleteName
   * @param {Array<{reps,dist,pct,recup}>} blocData
   * @param {number} vma
   * @returns {Uint8Array}
   */
  function generateFIT(athleteName, blocData, vma) {
    // Count total workout_step messages:
    // For each bloc: reps active steps + (1 rest step if recup > 0)
    // + 1 cooldown step at end
    let numSteps = 1; // cooldown
    for (const b of blocData) {
      numSteps += b.reps;
      if (b.recup > 0) numSteps += 1;
    }

    const wktName = ('VMA - ' + athleteName).slice(0, 30);
    const wktNameLen = 16; // fixed string field length in FIT workout message

    // Estimate buffer size generously
    const bufSize = 14 + 300 + numSteps * 40 + 4;
    const buf = new ArrayBuffer(bufSize);
    const dv  = new DataView(buf);
    const arr = new Uint8Array(buf);
    let off = 0;

    // ── File header (14 bytes) ──────────────────────────────────────────────
    off = writeU8(dv, off, 0x0E);            // header size = 14
    off = writeU8(dv, off, 0x10);            // protocol version 1.0
    off = writeU16(dv, off, 0x08CC);         // profile version 2252
    const dataSizeOffset = off;              // placeholder — filled in after
    off = writeU32(dv, off, 0);
    arr[off++] = 0x2E; arr[off++] = 0x46; arr[off++] = 0x49; arr[off++] = 0x54; // ".FIT"
    const headerCRC = crc16(arr.slice(0, 12));
    off = writeU16(dv, off, headerCRC);
    const dataStart = off; // 14

    // ── Definition: file_id (local msg 0, global msg 0) ────────────────────
    arr[off++] = 0x40; // definition record header, local msg 0
    arr[off++] = 0x00; // reserved
    arr[off++] = 0x00; // arch = little-endian
    off = writeU16(dv, off, 0); // global msg 0 = file_id
    arr[off++] = 3;    // 3 fields
    arr[off++] = 0; arr[off++] = 1; arr[off++] = 0x00; // type: field 0, size 1, enum
    arr[off++] = 1; arr[off++] = 2; arr[off++] = 0x84; // manufacturer: field 1, size 2, uint16
    arr[off++] = 4; arr[off++] = 4; arr[off++] = 0x86; // time_created: field 4, size 4, uint32

    // Data: file_id
    arr[off++] = 0x00; // data record header, local msg 0
    arr[off++] = 5;    // type = workout
    off = writeU16(dv, off, 255); // manufacturer = development
    const fitEpoch = Math.floor(Date.now() / 1000) - 631065600;
    off = writeU32(dv, off, fitEpoch);

    // ── Definition: workout (local msg 1, global msg 26) ───────────────────
    arr[off++] = 0x41; // definition, local msg 1
    arr[off++] = 0x00;
    arr[off++] = 0x00; // little-endian
    off = writeU16(dv, off, 26); // global msg 26 = workout
    arr[off++] = 3;    // 3 fields
    arr[off++] = 4; arr[off++] = 1; arr[off++] = 0x00; // sport: field 4, size 1, enum
    arr[off++] = 6; arr[off++] = 2; arr[off++] = 0x84; // num_valid_steps: field 6, size 2, uint16
    arr[off++] = 8; arr[off++] = wktNameLen; arr[off++] = 0x07; // wkt_name: field 8, size 16, string

    // Data: workout
    arr[off++] = 0x01; // local msg 1
    arr[off++] = 1;    // sport = running
    off = writeU16(dv, off, numSteps);
    off = writeStr(arr, off, wktName, wktNameLen);

    // ── Definition: workout_step (local msg 2, global msg 27) ──────────────
    arr[off++] = 0x42; // definition, local msg 2
    arr[off++] = 0x00;
    arr[off++] = 0x00;
    off = writeU16(dv, off, 27); // global msg 27 = workout_step
    arr[off++] = 4;    // 4 fields
    arr[off++] = 5; arr[off++] = 1; arr[off++] = 0x00; // duration_type: field 5, size 1, enum
    arr[off++] = 6; arr[off++] = 4; arr[off++] = 0x86; // duration_value: field 6, size 4, uint32
    arr[off++] = 4; arr[off++] = 1; arr[off++] = 0x00; // target_type: field 4, size 1, enum
    arr[off++] = 0; arr[off++] = 1; arr[off++] = 0x00; // intensity: field 0, size 1, enum

    // ── workout_step data messages ──────────────────────────────────────────
    function writeStep(durationType, durationValue, intensity) {
      arr[off++] = 0x02; // local msg 2
      arr[off++] = durationType;
      off = writeU32(dv, off, durationValue);
      arr[off++] = 0;    // target_type = 0 (open)
      arr[off++] = intensity;
    }

    for (const b of blocData) {
      const { timeS } = calcBlock(vma, b.pct, b.dist);
      const durMs = Math.round(timeS) * 1000;
      for (let i = 0; i < b.reps; i++) {
        writeStep(0, durMs, 0); // duration_type=time, intensity=active
      }
      if (b.recup > 0) {
        writeStep(0, b.recup * 60 * 1000, 1); // intensity=rest
      }
    }
    // Cooldown step (open duration)
    writeStep(2, 0, 2); // duration_type=open, intensity=cooldown

    const dataEnd = off;
    const dataSize = dataEnd - dataStart;

    // Fill in data size in header
    dv.setUint32(dataSizeOffset, dataSize, true);

    // ── File footer CRC ─────────────────────────────────────────────────────
    const fileCRC = crc16(arr.slice(0, dataEnd));
    off = writeU16(dv, off, fileCRC);

    return arr.slice(0, off);
  }

// ─── TCX export ──────────────────────────────────────────────────────────────

/**
 * Generate a TCX workout XML string for Huawei Health.
 * Recovery is placed ONCE after the entire repeat block (not per repetition).
 * @param {string} athleteName
 * @param {Array<{reps,dist,pct,recup}>} blocData
 * @param {number} vma
 * @returns {string}
 */
function generateTCX(athleteName, blocData, vma) {
  const workoutName = ('VMA - ' + athleteName).slice(0, 30)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let stepId = 1;
  let stepsXml = '';

  for (const b of blocData) {
    const { timeS } = calcBlock(vma, b.pct, b.dist);
    const durSec = Math.round(timeS);

    // One Repeat_t per bloc, containing only the active Child steps
    stepsXml += `
      <Step xsi:type="Repeat_t">
        <Repetitions>${b.reps}</Repetitions>
        <Child xsi:type="Step_t">
          <StepId>${stepId++}</StepId>
          <Duration xsi:type="Time_t"><Seconds>${durSec}</Seconds></Duration>
          <Intensity>Active</Intensity>
          <Target xsi:type="None_t"/>
        </Child>
      </Step>`;

    // Recovery is a top-level Step_t AFTER the Repeat_t (runs once, not N times)
    if (b.recup > 0) {
      stepsXml += `
      <Step xsi:type="Step_t">
        <StepId>${stepId++}</StepId>
        <Duration xsi:type="Time_t"><Seconds>${b.recup * 60}</Seconds></Duration>
        <Intensity>Rest</Intensity>
        <Target xsi:type="None_t"/>
      </Step>`;
    }
  }

  return `<?xml version="1.0" encoding="UTF-8"?>
<TrainingCenterDatabase
  xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
  xsi:schemaLocation="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2 http://www.garmin.com/xmlschemas/TrainingCenterDatabasev2.xsd">
  <Workouts>
    <Workout Sport="Running">
      <Name>${workoutName}</Name>${stepsXml}
    </Workout>
  </Workouts>
</TrainingCenterDatabase>`;
}

// ─── Download helpers ────────────────────────────────────────────────────────

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  // ─── Garmin Connect auto-send ─────────────────────────────────────────────

  function garminShowState(state) {
    document.getElementById('garmin-state-a').style.display = state === 'a' ? '' : 'none';
    document.getElementById('garmin-state-b').style.display = state === 'b' ? '' : 'none';
  }

  function garminSetMsg(id, html) {
    document.getElementById(id).innerHTML = html;
  }

  async function garminConnect() {
    const email    = document.getElementById('garmin-email').value.trim();
    const password = document.getElementById('garmin-password').value;
    if (!email || !password) {
      garminSetMsg('garmin-msg', '<span style="color:#ef4444">Entrez votre email et mot de passe</span>');
      return;
    }
    const btn = document.getElementById('btn-garmin-connect');
    btn.disabled = true;
    btn.textContent = 'Connexion…';
    garminSetMsg('garmin-msg', '');

    try {
      const res = await fetch('/.netlify/functions/garmin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        garminSetMsg('garmin-msg', `<span style="color:#ef4444">${data.error || 'Erreur'}</span>`);
        btn.disabled = false;
        btn.textContent = 'Connecter mon compte Garmin';
        return;
      }
      localStorage.setItem('garmin_session_cookies', data.sessionCookies);
      localStorage.setItem('garmin_expires_at', String(data.expiresAt));
      localStorage.setItem('garmin_email', email);
      document.getElementById('garmin-connected-label').textContent = `Connecté (${email})`;
      garminShowState('b');
    } catch {
      garminSetMsg('garmin-msg', '<span style="color:#ef4444">Erreur réseau, réessayez</span>');
      btn.disabled = false;
      btn.textContent = 'Connecter mon compte Garmin';
    }
  }

  async function garminSend() {
    const sessionCookies = localStorage.getItem('garmin_session_cookies');
    const expiresAt      = parseInt(localStorage.getItem('garmin_expires_at') || '0', 10);
    if (!sessionCookies || Date.now() >= expiresAt) {
      garminDisconnect();
      return;
    }

    const { name, vma, blocData } = getExportData();
    const workoutName = ('VMA - ' + name).slice(0, 30);
    const blocs = blocData.map(b => {
      const { timeS } = calcBlock(vma, b.pct, b.dist);
      return { ...b, durSec: Math.round(timeS) };
    });

    const btn = document.getElementById('btn-garmin-send');
    btn.disabled = true;
    btn.textContent = 'Envoi…';
    garminSetMsg('garmin-msg-b', '');

    try {
      const res = await fetch('/.netlify/functions/garmin-workout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionCookies, workoutName, blocs }),
      });
      const data = await res.json();
      if (res.status === 401) {
        garminDisconnect();
        garminSetMsg('garmin-msg', '<span style="color:#ef4444">Session expirée, reconnectez-vous</span>');
        return;
      }
      if (!res.ok) {
        garminSetMsg('garmin-msg-b', `<span style="color:#ef4444">${data.error || 'Erreur'}</span>`);
        btn.disabled = false;
        btn.textContent = '↑ Envoyer la séance sur Garmin';
        return;
      }
      const link = `https://connect.garmin.com/modern/workout/${data.workoutId}`;
      garminSetMsg('garmin-msg-b',
        `Séance envoyée ! <a href="${link}" target="_blank" rel="noopener">Ouvrir dans Garmin Connect →</a>`
      );
    } catch {
      garminSetMsg('garmin-msg-b', '<span style="color:#ef4444">Erreur réseau, réessayez</span>');
    } finally {
      btn.disabled = false;
      btn.textContent = '↑ Envoyer la séance sur Garmin';
    }
  }

  function garminDisconnect() {
    localStorage.removeItem('garmin_session_cookies');
    localStorage.removeItem('garmin_expires_at');
    localStorage.removeItem('garmin_email');
    document.getElementById('garmin-email').value = '';
    document.getElementById('garmin-password').value = '';
    garminShowState('a');
  }

  function initGarminUI() {
    const expiresAt = parseInt(localStorage.getItem('garmin_expires_at') || '0', 10);
    if (expiresAt && Date.now() < expiresAt) {
      const email = localStorage.getItem('garmin_email') || '';
      document.getElementById('garmin-connected-label').textContent = `Connecté (${email})`;
      garminShowState('b');
    } else {
      localStorage.removeItem('garmin_session_cookies');
      localStorage.removeItem('garmin_expires_at');
      localStorage.removeItem('garmin_email');
      garminShowState('a');
    }
  }

function getExportData() {
  const name = document.getElementById('athlete-name').value.trim();
  const vma  = parseInt(document.getElementById('athlete-vma').value, 10);
  const blocData = [];
  document.querySelectorAll('.bloc').forEach(el => {
    blocData.push({
      reps:  parseInt(el.querySelector('.b-reps').value, 10),
      dist:  parseInt(el.querySelector('.b-dist').value, 10),
      pct:   parseInt(el.querySelector('.b-pct').value, 10),
      recup: parseInt(el.querySelector('.b-recup').value, 10),
    });
  });
  return { name, vma, blocData };
}

document.getElementById('btn-fit').addEventListener('click', () => {
  const { name, vma, blocData } = getExportData();
  const fit = generateFIT(name, blocData, vma);
  const blob = new Blob([fit], { type: 'application/octet-stream' });
  downloadBlob(blob, `vma-${slugify(name)}-${todayISO()}.fit`);
});

document.getElementById('btn-tcx').addEventListener('click', () => {
  const { name, vma, blocData } = getExportData();
  const xml = generateTCX(name, blocData, vma);
  const blob = new Blob([xml], { type: 'text/xml' });
  downloadBlob(blob, `vma-${slugify(name)}-${todayISO()}.tcx`);
});
  </script>
