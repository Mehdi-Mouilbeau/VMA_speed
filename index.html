<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur VMA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 16px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
      text-align: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 80px;
    }
    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: #6b7280;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
      background: #fff;
    }
    input.invalid {
      border-color: #ef4444;
    }
    .error-msg {
      font-size: 0.72rem;
      color: #ef4444;
      min-height: 16px;
    }
    .bloc {
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      position: relative;
    }
    .bloc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .bloc-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
    }
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #ef4444; }
    .btn-add {
      width: 100%;
      padding: 10px;
      border: 1.5px dashed #6366f1;
      border-radius: 8px;
      background: transparent;
      color: #6366f1;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: #eef2ff; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-bloc {
      margin-bottom: 14px;
    }
    .result-title {
      font-weight: 600;
      font-size: 0.92rem;
      color: #374151;
      margin-bottom: 4px;
    }
    .result-line {
      font-size: 0.88rem;
      color: #4b5563;
      margin-left: 8px;
      line-height: 1.7;
    }
    .result-line strong { color: #6366f1; }
    .export-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-export {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-export:active { transform: scale(0.98); }
    .btn-export:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-fit  { background: #6366f1; color: #fff; }
    .btn-tcx  { background: #10b981; color: #fff; }
    #no-results {
      color: #9ca3af;
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }
    @media (max-width: 400px) {
      .row { gap: 8px; }
      .field { min-width: 60px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏃 Calculateur VMA</h1>

    <!-- Athlete info -->
    <div class="card">
      <h2>Athlète</h2>
      <div class="row">
        <div class="field">
          <label for="athlete-name">Nom</label>
          <input type="text" id="athlete-name" placeholder="Ex: Mehdi" maxlength="30">
          <span class="error-msg" id="err-name"></span>
        </div>
        <div class="field" style="max-width:130px">
          <label for="athlete-vma">VMA (km/h)</label>
          <input type="number" id="athlete-vma" placeholder="14" min="8" max="25" step="1">
          <span class="error-msg" id="err-vma"></span>
        </div>
      </div>
    </div>

    <!-- Blocks -->
    <div class="card">
      <h2>Séance</h2>
      <div id="blocs-container"></div>
      <button class="btn-add" id="btn-add-bloc">+ Ajouter un bloc</button>
    </div>

    <!-- Results -->
    <div class="card">
      <h2>Résultats</h2>
      <div id="results">
        <p id="no-results">Remplissez les champs pour voir les résultats</p>
      </div>
    </div>

    <!-- Export -->
    <div class="card">
      <h2>Export montre</h2>
      <div class="export-btns">
        <button class="btn-export btn-fit" id="btn-fit" disabled>
          ↓ Télécharger .fit (Garmin / Polar)
        </button>
        <button class="btn-export btn-tcx" id="btn-tcx" disabled>
          ↓ Télécharger .tcx (Huawei)
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── Calculation ────────────────────────────────────────────────────────────

    /**
     * Format raw seconds into "M:SS" or "MM:SS".
     * Uses Math.round first to avoid floating-point drift and ":60" bug.
     */
    function formatTime(rawSeconds) {
      const total = Math.round(rawSeconds);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    /**
     * Calculate target time (seconds) and pace (seconds/km) for a given block.
     * @param {number} vma      - VMA in km/h
     * @param {number} pct      - percentage of VMA (e.g. 90 for 90%)
     * @param {number} distance - distance in meters
     * @returns {{ timeS: number, paceS: number, timeDisplay: string, paceDisplay: string }}
     */
    function calcBlock(vma, pct, distance) {
      const speedMs = vma * (pct / 100) / 3.6;        // m/s
      const timeS   = distance / speedMs;              // seconds
      const paceS   = (timeS / distance) * 1000;       // seconds per km
      return {
        timeS,
        paceS,
        timeDisplay: formatTime(timeS),
        paceDisplay: formatTime(paceS) + '/km',
      };
    }

    /**
     * Build slug for filename from athlete name.
     * "Méhdi Traoré" → "mehdi-traore"
     */
    function slugify(name) {
      return name
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-zA-Z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .toLowerCase();
    }

    /**
     * Return today's date as YYYY-MM-DD.
     */
    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }
  </script>
</body>
</html>
